title: "FSF Testing"
views:
  - title: "Test Controls"
    path: default_view
    cards:
      # Card 1 — Entity State + Attributes
      - type: entities
        title: "Testflip Entity"
        entities:
          - entity: select.testflip
          - type: attribute
            entity: select.testflip
            attribute: active_slot
            name: Active Slot
          - type: attribute
            entity: select.testflip
            attribute: scene_a
            name: Scene A
          - type: attribute
            entity: select.testflip
            attribute: scene_b
            name: Scene B
          - type: attribute
            entity: select.testflip
            attribute: skip_a
            name: Skip A
          - type: attribute
            entity: select.testflip
            attribute: skip_b
            name: Skip B
          - type: attribute
            entity: select.testflip
            attribute: flip_list_a
            name: Flip List A
          - type: attribute
            entity: select.testflip
            attribute: flip_list_b
            name: Flip List B
          - type: attribute
            entity: select.testflip
            attribute: flip_index_a
            name: Flip Index A
          - type: attribute
            entity: select.testflip
            attribute: flip_index_b
            name: Flip Index B

      # Card 2 — Activity Log
      - type: logbook
        title: "Scene Activity"
        hours_to_show: 1
        entities:
          - select.testflip
          - scene.day_mode
          - scene.night_mode
          - scene.movie_time
          - scene.bright_lights
          - scene.dim_lights
          - scene.cozy_evening

      # Card 3 — Core Actions
      - type: grid
        title: "Core Actions"
        columns: 3
        cards:
          - type: button
            name: Toggle
            icon: mdi:swap-horizontal
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.toggle
              data:
                entity_id: select.testflip
          - type: button
            name: Activate A
            icon: mdi:alpha-a-circle
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.activate
              data:
                entity_id: select.testflip
                slot: a
          - type: button
            name: Activate B
            icon: mdi:alpha-b-circle
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.activate
              data:
                entity_id: select.testflip
                slot: b

      # Card 4 — Skipper Actions
      - type: grid
        title: "Skipper"
        columns: 3
        cards:
          - type: button
            name: Skip A
            icon: mdi:skip-next
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: a
                enable: true
          - type: button
            name: Skip B
            icon: mdi:skip-next
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: b
                enable: true
          - type: button
            name: Skip Both
            icon: mdi:skip-forward
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: both
                enable: true
          - type: button
            name: Clear Skip A
            icon: mdi:close-circle-outline
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: a
                enable: false
          - type: button
            name: Clear Skip B
            icon: mdi:close-circle-outline
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: b
                enable: false
          - type: button
            name: Clear All
            icon: mdi:close-circle
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.skip
              data:
                entity_id: select.testflip
                slot: both
                enable: false

      # Card 5 — Flipper Actions
      - type: grid
        title: "Flipper"
        columns: 2
        cards:
          - type: button
            name: Flip Prev
            icon: mdi:skip-previous
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.flip_prev
              data:
                entity_id: select.testflip
          - type: button
            name: Flip Next
            icon: mdi:skip-next-outline
            tap_action:
              action: perform-action
              perform_action: friendly_scene_flipper.flip_next
              data:
                entity_id: select.testflip

      # Card 6 — Set Scene buttons
      - type: vertical-stack
        title: "Set Scene"
        cards:
          - type: markdown
            content: "### Assign to Slot A"
          - type: grid
            columns: 3
            cards:
              - type: button
                name: Day Mode
                icon: mdi:white-balance-sunny
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.day_mode
              - type: button
                name: Night Mode
                icon: mdi:moon-waning-crescent
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.night_mode
              - type: button
                name: Movie Time
                icon: mdi:movie-open
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.movie_time
              - type: button
                name: Bright Lights
                icon: mdi:lightbulb-on
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.bright_lights
              - type: button
                name: Dim Lights
                icon: mdi:lightbulb-on-10
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.dim_lights
              - type: button
                name: Cozy Evening
                icon: mdi:fireplace
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: a
                    scene_entity_id: scene.cozy_evening
          - type: markdown
            content: "### Assign to Slot B"
          - type: grid
            columns: 3
            cards:
              - type: button
                name: Day Mode
                icon: mdi:white-balance-sunny
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.day_mode
              - type: button
                name: Night Mode
                icon: mdi:moon-waning-crescent
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.night_mode
              - type: button
                name: Movie Time
                icon: mdi:movie-open
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.movie_time
              - type: button
                name: Bright Lights
                icon: mdi:lightbulb-on
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.bright_lights
              - type: button
                name: Dim Lights
                icon: mdi:lightbulb-on-10
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.dim_lights
              - type: button
                name: Cozy Evening
                icon: mdi:fireplace
                tap_action:
                  action: perform-action
                  perform_action: friendly_scene_flipper.set_scene
                  data:
                    entity_id: select.testflip
                    slot: b
                    scene_entity_id: scene.cozy_evening

      # Card 7 — Available Scenes
      - type: entities
        title: "Available Scenes"
        entities:
          - entity: scene.day_mode
          - entity: scene.night_mode
          - entity: scene.movie_time
          - entity: scene.bright_lights
          - entity: scene.dim_lights
          - entity: scene.cozy_evening
